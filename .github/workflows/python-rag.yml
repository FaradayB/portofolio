name: python-rag
on:
  push:
    paths: ["api/**", "rag/**", "tests/**", ".github/workflows/python-rag.yml"]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r rag/requirements.txt
      - run: pytest tests/ -v
